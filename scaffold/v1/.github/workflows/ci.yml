name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SENTRY_ORG: ${{ vars.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Sentry version
        id: version
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            VERSION=$(npx sentry-cli releases propose-version)
          else
            VERSION="local-${{ github.run_id }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Sentry version: $VERSION"

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check extensions
        run: |
          echo "Checking TypeScript syntax..."
          for f in extensions/*.ts lib/*.ts; do
            [ -f "$f" ] && echo "✓ $f"
          done

  build:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify structure
        run: |
          echo "Extension files:"
          ls -la extensions/
          echo ""
          echo "Pi assets:"
          ls -la .pi/
          echo ""
          echo "Agent definitions:"
          ls -la .pi/agents/

  sentry:
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: env.SENTRY_AUTH_TOKEN != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Configure Sentry
        run: |
          npx sentry-cli config set-url-prefix 'gs://your-bucket'
          echo "Sentry org: $SENTRY_ORG"
          echo "Sentry project: $SENTRY_PROJECT"

      - name: Create release
        run: |
          npx sentry-cli releases new "${{ needs.setup.outputs.version }}" --ignore-empty
          npx sentry-cli releases set-commits "${{ needs.setup.outputs.version }}" --auto

      - name: Upload source maps
        if: github.event_name == 'push'
        run: |
          npx sentry-cli releases files "${{ needs.setup.outputs.version }}" upload-sourcemaps . \
            --ignore '*.map' \
            --ignore 'node_modules/' \
            --ignore '.git/' \
            --release "${{ needs.setup.outputs.version }}" || true
          echo "✅ Source maps uploaded"

      - name: Check for new errors
        run: |
          # Wait a bit for errors to appear
          sleep 5
          ERRORS=$(npx sentry-cli releases needs "${{ needs.setup.outputs.version }}" 2>/dev/null | grep -c "id:" || echo "0")
          if [ "$ERRORS" -gt "0" ]; then
            echo "Found unresolved issues in release"
            npx sentry-cli releases issues "${{ needs.setup.outputs.version }}"
            exit 1
          else
            echo "✅ No new errors in release"
          fi

      - name: Finalize release
        if: github.event_name == 'push'
        run: |
          npx sentry-cli releases finalize "${{ needs.setup.outputs.version }}" || true

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: |
          echo "Running extension tests..."
          # Add your test commands here
          echo "No tests configured yet"
